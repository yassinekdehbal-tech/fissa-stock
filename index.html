<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FISSA PIECE AUTO</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsbarcode/3.11.6/JsBarcode.all.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, push, set, onValue, remove, update, get } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';
const firebaseConfig = {
  apiKey: "AIzaSyAjRxW1hHY7ikmcm2-QOOvZDhUxl9CeE3Y",
  authDomain: "fissa-stock.firebaseapp.com",
  databaseURL: "https://fissa-stock-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "fissa-stock",
  storageBucket: "fissa-stock.firebasestorage.app",
  messagingSenderId: "657308229308",
  appId: "1:657308229308:web:6677ba616259cf8915bab9"
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
window._db=db; window._ref=ref; window._push=push; window._set=set;
window._onValue=onValue; window._remove=remove; window._update=update; window._get=get;
window.addEventListener('DOMContentLoaded', () => initApp());
</script>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');
:root{--bg:#0d1117;--surface:#161b22;--surface2:#21262d;--accent:#e6a817;--accent2:#3fb950;--blue:#58a6ff;--danger:#f85149;--purple:#bc8cff;--orange:#f0883e;--text:#e6edf3;--muted:#8b949e;--border:#30363d;--radius:8px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;min-height:100vh;}

/* LOGIN */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:40px;width:90%;max-width:380px;text-align:center;}
.login-logo{font-family:'IBM Plex Mono',monospace;font-size:22px;font-weight:700;color:var(--accent);margin-bottom:4px;}
.login-logo span{color:var(--accent2);}
.login-sub{color:var(--muted);font-size:12px;margin-bottom:28px;font-family:'IBM Plex Mono',monospace;}
.login-form{display:flex;flex-direction:column;gap:12px;text-align:left;}
.login-form label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
.login-form input{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:14px;padding:10px 14px;outline:none;width:100%;transition:border-color .15s;}
.login-form input:focus{border-color:var(--accent);}
.login-err{color:var(--danger);font-size:12px;font-family:'IBM Plex Mono',monospace;display:none;margin-top:4px;}

/* APP */
#app{display:none;flex-direction:column;min-height:100vh;}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;}
.logo{font-family:'IBM Plex Mono',monospace;font-weight:700;font-size:16px;color:var(--accent);}
.logo span{color:var(--accent2);}
#sync-dot{font-size:11px;color:var(--muted);font-family:'IBM Plex Mono',monospace;}
.user-badge{margin-left:auto;display:flex;align-items:center;gap:8px;font-size:12px;font-family:'IBM Plex Mono',monospace;}
.role-tag{padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;text-transform:uppercase;}
.role-admin{background:rgba(188,140,255,.2);color:var(--purple);border:1px solid rgba(188,140,255,.3);}
.role-user{background:rgba(63,185,80,.2);color:var(--accent2);border:1px solid rgba(63,185,80,.3);}
.btn-logout{background:none;border:1px solid var(--border);color:var(--muted);border-radius:4px;padding:4px 10px;cursor:pointer;font-size:11px;font-family:'IBM Plex Mono',monospace;}
.btn-logout:hover{border-color:var(--danger);color:var(--danger);}
.tab-bar{background:var(--surface2);border-bottom:1px solid var(--border);padding:0 20px;display:flex;overflow-x:auto;}
.tab{padding:10px 16px;cursor:pointer;font-size:13px;font-weight:500;border:none;background:transparent;color:var(--muted);transition:all .15s;font-family:'IBM Plex Sans',sans-serif;border-bottom:2px solid transparent;white-space:nowrap;}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.tab:hover:not(.active){color:var(--text);}
main{flex:1;padding:20px;max-width:1200px;width:100%;margin:0 auto;}
.panel{display:none;}.panel.active{display:block;}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:22px;margin-bottom:18px;}
.card-title{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:2px;margin-bottom:16px;}

/* FORM */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.form-group{display:flex;flex-direction:column;gap:5px;}
.form-group.full{grid-column:1/-1;}
label{font-size:11px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
.req{color:var(--danger);}
input,select,textarea{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:13px;padding:9px 12px;outline:none;transition:border-color .15s;width:100%;}
input:focus,select:focus{border-color:var(--accent);}
input.invalid{border-color:var(--danger)!important;}
select option{background:var(--surface);}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:var(--radius);font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all .15s;text-transform:uppercase;letter-spacing:1px;white-space:nowrap;}
.btn-primary{background:var(--accent);color:#111;}.btn-primary:hover{filter:brightness(1.1);}
.btn-success{background:var(--accent2);color:#111;}.btn-success:hover{filter:brightness(1.1);}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}.btn-outline:hover{border-color:var(--accent);color:var(--accent);}
.btn-danger{background:var(--danger);color:#fff;}
.btn-purple{background:var(--purple);color:#111;}
.btn-row{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:18px;}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;}
.stat strong{font-size:24px;font-family:'IBM Plex Mono',monospace;display:block;line-height:1.1;}
.stat span{color:var(--muted);font-size:11px;margin-top:3px;display:block;}
.stat.c-accent strong{color:var(--accent);}
.stat.c-green strong{color:var(--accent2);}
.stat.c-blue strong{color:var(--blue);}
.stat.c-purple strong{color:var(--purple);}
.stat.c-orange strong{color:var(--orange);}

/* DASHBOARD GRID */
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
@media(max-width:700px){.dash-grid{grid-template-columns:1fr;}}

/* CHART */
.chart-wrap{display:flex;align-items:flex-end;gap:3px;height:70px;margin-top:8px;}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;}
.bar{width:100%;background:var(--accent);border-radius:3px 3px 0 0;min-height:2px;transition:height .3s;}
.bar-lbl{font-size:9px;color:var(--muted);font-family:'IBM Plex Mono',monospace;}
.bar-val{font-size:8px;color:var(--accent);font-family:'IBM Plex Mono',monospace;}

/* PAYMENT PIE */
.pay-list{display:flex;flex-direction:column;gap:6px;margin-top:8px;}
.pay-row{display:flex;align-items:center;gap:8px;font-size:12px;}
.pay-bar{height:6px;border-radius:3px;background:var(--accent);transition:width .3s;}
.pay-label{min-width:80px;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);}
.pay-val{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--accent2);margin-left:auto;}

/* ACTIVITY */
.activity-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px;}
.activity-avatar{width:28px;height:28px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-weight:700;font-size:11px;color:var(--accent);flex-shrink:0;}
.activity-name{font-weight:600;min-width:90px;}
.activity-stat{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--accent2);}

/* TABLE */
.toolbar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center;}
.search-box{flex:1;min-width:150px;}
.table-wrap{overflow-x:auto;background:var(--surface);border:1px solid var(--border);border-radius:12px;}
table{width:100%;border-collapse:collapse;font-size:12px;}
thead th{text-align:left;padding:10px 12px;background:var(--surface2);border-bottom:1px solid var(--border);font-family:'IBM Plex Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);white-space:nowrap;}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s;}
tbody tr:hover{background:var(--surface2);}
td{padding:10px 12px;vertical-align:middle;}
.ref-pill{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--accent);font-weight:700;background:rgba(230,168,23,.1);padding:2px 7px;border-radius:4px;border:1px solid rgba(230,168,23,.3);white-space:nowrap;}
.qty-pill{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:700;padding:2px 9px;border-radius:20px;display:inline-block;}
.qty-ok{background:rgba(63,185,80,.15);color:var(--accent2);border:1px solid rgba(63,185,80,.3);}
.qty-low{background:rgba(248,81,73,.15);color:var(--danger);border:1px solid rgba(248,81,73,.3);}
.qty-zero{background:rgba(139,148,158,.15);color:var(--muted);border:1px solid var(--border);}
.zone-tag{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;background:rgba(88,166,255,.1);color:var(--blue);border:1px solid rgba(88,166,255,.2);}
.price-tag{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--accent2);font-weight:600;}
.action-btns{display:flex;gap:4px;}
.btn-xs{padding:3px 8px;font-size:10px;border-radius:4px;cursor:pointer;font-family:'IBM Plex Mono',monospace;font-weight:600;border:1px solid var(--border);background:transparent;color:var(--muted);transition:all .1s;text-transform:uppercase;white-space:nowrap;}
.btn-xs:hover{border-color:var(--accent);color:var(--accent);}
.btn-xs.del:hover{border-color:var(--danger);color:var(--danger);}
.btn-xs.sell:hover{border-color:var(--accent2);color:var(--accent2);}
.empty-state{text-align:center;padding:40px 20px;color:var(--muted);font-size:13px;}
.piece-thumb{width:40px;height:40px;object-fit:cover;border-radius:4px;border:1px solid var(--border);}

/* SCANNER */
.cam-wrap{position:relative;display:inline-block;width:100%;max-width:440px;}
#camera-view{width:100%;border-radius:var(--radius);overflow:hidden;border:2px solid var(--border);background:#000;min-height:180px;}
.scan-frame{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:65%;height:45%;border:2px solid var(--accent);border-radius:4px;pointer-events:none;opacity:0;transition:opacity .3s;}
.scan-frame.on{opacity:1;}
.scan-line{position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);animation:sl 2s ease-in-out infinite;opacity:0;}
.scan-line.on{opacity:1;}
@keyframes sl{0%,100%{top:5%}50%{top:90%}}
.cam-status{display:inline-flex;align-items:center;gap:7px;font-size:11px;font-family:'IBM Plex Mono',monospace;color:var(--muted);margin-top:8px;}
.dot{width:7px;height:7px;border-radius:50%;background:var(--muted);}
.cam-status.on .dot{background:var(--accent2);animation:blink 1s infinite;}
.cam-status.err .dot{background:var(--danger);}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
#scan-result{display:none;background:var(--surface2);border:2px solid var(--accent2);border-radius:12px;padding:16px;margin-top:14px;}
#scan-result.err{border-color:var(--danger);}
.usb-row{display:flex;gap:8px;align-items:center;margin-top:12px;}
#scan-log{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:12px;max-height:220px;overflow-y:auto;margin-top:12px;}
.log-entry{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);font-family:'IBM Plex Mono',monospace;font-size:11px;animation:fadeIn .3s;}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
.log-ts{color:var(--muted);min-width:60px;}.log-ref{color:var(--accent);font-weight:700;}
.log-name{flex:1;color:var(--text);}.log-ok{color:var(--accent2);}.log-err{color:var(--danger);}

/* HISTORIQUE */
.histo-entry{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);font-size:12px;flex-wrap:wrap;}
.histo-date{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);min-width:120px;}
.histo-ref{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--accent);font-weight:700;min-width:80px;}
.histo-user{font-size:10px;padding:1px 6px;border-radius:3px;background:rgba(88,166,255,.1);color:var(--blue);border:1px solid rgba(88,166,255,.2);white-space:nowrap;}
.histo-name{flex:1;}
.histo-action{font-family:'IBM Plex Mono',monospace;font-size:10px;padding:2px 7px;border-radius:4px;white-space:nowrap;}
.histo-vendu{background:rgba(63,185,80,.15);color:var(--accent2);}
.histo-ajout{background:rgba(88,166,255,.15);color:var(--blue);}
.histo-modif{background:rgba(230,168,23,.15);color:var(--accent);}

/* USERS */
.user-card{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:8px;}
.user-card-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.user-avatar{width:34px;height:34px;border-radius:50%;background:var(--surface);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-weight:700;font-size:13px;color:var(--accent);flex-shrink:0;}
.user-info{flex:1;}
.user-name{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:600;}
.user-id-display{font-size:11px;color:var(--muted);}
.perm-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.perm-badge{font-size:10px;padding:3px 8px;border-radius:4px;font-family:'IBM Plex Mono',monospace;font-weight:600;}
.perm-magasinier{background:rgba(88,166,255,.15);color:var(--blue);border:1px solid rgba(88,166,255,.3);}
.perm-vendeur{background:rgba(63,185,80,.15);color:var(--accent2);border:1px solid rgba(63,185,80,.3);}
.perm-historique{background:rgba(230,168,23,.15);color:var(--accent);border:1px solid rgba(230,168,23,.3);}

/* PERM CHECKBOXES */
.perm-checks{display:flex;flex-direction:column;gap:10px;margin-top:12px;}
.perm-check{display:flex;align-items:flex-start;gap:10px;padding:10px;background:var(--surface2);border-radius:6px;border:1px solid var(--border);cursor:pointer;}
.perm-check input[type=checkbox]{width:16px;height:16px;accent-color:var(--accent);flex-shrink:0;margin-top:2px;cursor:pointer;}
.perm-check-info strong{font-size:13px;display:block;margin-bottom:2px;}
.perm-check-info span{font-size:11px;color:var(--muted);}

/* BARCODE */
#barcode-preview{display:none;background:white;border-radius:var(--radius);padding:14px;margin-top:14px;text-align:center;max-width:280px;border:2px solid var(--accent);}

/* ALERT BADGE */
.alert-badge{background:rgba(248,81,73,.15);border:1px solid rgba(248,81,73,.3);color:var(--danger);font-size:11px;padding:2px 8px;border-radius:4px;font-family:'IBM Plex Mono',monospace;}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:1000;align-items:center;justify-content:center;padding:16px;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px;width:100%;max-width:500px;position:relative;max-height:90vh;overflow-y:auto;}
.modal-title{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:700;color:var(--accent);margin-bottom:16px;}
.modal-close{position:absolute;top:14px;right:14px;background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;}

/* TICKET */
#ticket-print{display:none;}
@media print{
  body>*{display:none!important;}
  #ticket-print{display:block!important;font-family:'IBM Plex Mono',monospace;padding:20px;max-width:300px;margin:0 auto;}
  .ticket-header{text-align:center;border-bottom:2px dashed #000;padding-bottom:10px;margin-bottom:10px;}
  .ticket-row{display:flex;justify-content:space-between;font-size:12px;margin:3px 0;}
  .ticket-total{border-top:2px dashed #000;margin-top:8px;padding-top:8px;font-weight:bold;}
}

/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;background:var(--accent2);color:#111;font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;padding:10px 16px;border-radius:var(--radius);z-index:2000;opacity:0;transform:translateY(8px);transition:all .2s;pointer-events:none;}
.toast.show{opacity:1;transform:none;}
.toast.err{background:var(--danger);color:#fff;}

@media(max-width:600px){
  .form-grid{grid-template-columns:1fr;}
  .form-group.full{grid-column:1;}
  header{flex-wrap:wrap;}
  .tab{font-size:11px;padding:8px 8px;}
  main{padding:12px;}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">FISSA <span>PIECE</span> AUTO</div>
    <div class="login-sub">Gestion de stock — Pièces d'occasion</div>
    <div class="login-form">
      <div class="form-group"><label>Identifiant</label><input type="text" id="login-id" placeholder="Votre identifiant" autocomplete="username"></div>
      <div class="form-group"><label>Mot de passe</label><input type="password" id="login-pwd" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <div class="login-err" id="login-err">Identifiant ou mot de passe incorrect</div>
      <button class="btn btn-primary" style="width:100%;justify-content:center;margin-top:6px;" onclick="doLogin()">Se connecter</button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header>
    <div class="logo">FISSA <span>PIECE</span> AUTO</div>
    <span id="sync-dot">🟢 Synchronisé</span>
    <div class="user-badge">
      <span id="hdr-name"></span>
      <span class="role-tag" id="hdr-role"></span>
      <button class="btn-logout" onclick="doLogout()">Déconnexion</button>
    </div>
  </header>
  <div class="tab-bar" id="tab-bar"></div>
  <main id="main-content"></main>
</div>

<!-- MODAL VENTE -->
<div class="modal-overlay" id="modal-sell">
  <div class="modal">
    <div class="modal-title">💰 Enregistrer une vente</div>
    <button class="modal-close" onclick="closeModal('modal-sell')">✕</button>
    <input type="hidden" id="sell-id">
    <div id="sell-info" style="margin-bottom:14px;font-size:13px;"></div>
    <div class="form-grid">
      <div class="form-group"><label>Quantité vendue <span class="req">*</span></label><input type="number" id="sell-qty" value="1" min="1"></div>
      <div class="form-group"><label>Prix de vente réel (€) <span class="req">*</span></label><input type="number" id="sell-price" step="0.01" min="0.01" placeholder="Obligatoire"></div>
      <div class="form-group"><label>Mode de paiement <span class="req">*</span></label>
        <select id="sell-payment"><option value="">-- Choisir --</option><option>Espèces</option><option>Carte bancaire</option><option>Virement</option><option>Chèque</option></select>
      </div>
      <div class="form-group"><label>Nom du client</label><input type="text" id="sell-client" placeholder="Optionnel"></div>
    </div>
    <div class="btn-row">
      <button class="btn btn-success" onclick="confirmSell()">✓ Confirmer la vente</button>
      <button class="btn btn-outline" onclick="closeModal('modal-sell')">Annuler</button>
    </div>
  </div>
</div>

<!-- MODAL EDIT PIECE -->
<div class="modal-overlay" id="modal-edit">
  <div class="modal">
    <div class="modal-title">✏ Modifier la pièce</div>
    <button class="modal-close" onclick="closeModal('modal-edit')">✕</button>
    <input type="hidden" id="edit-id">
    <div class="form-grid">
      <div class="form-group"><label>Référence</label><input id="edit-ref" disabled></div>
      <div class="form-group"><label>Désignation</label><input id="edit-name"></div>
      <div class="form-group"><label>Véhicule</label><input id="edit-vehicle"></div>
      <div class="form-group"><label>N° OEM</label><input id="edit-oem"></div>

<script>
// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
window._stock = [];
window._historique = [];
window._users = [];
let currentUser = null;

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
function initApp() {
  ensureAdmin();
  window._onValue(window._ref(window._db,'stock'), snap => {
    window._stock = Object.entries(snap.val()||{}).map(([id,v])=>({_id:id,...v}));
    refreshUI();
  });
  window._onValue(window._ref(window._db,'historique'), snap => {
    window._historique = Object.entries(snap.val()||{}).map(([id,v])=>({_id:id,...v})).sort((a,b)=>b.ts-a.ts);
    refreshUI();
  });
  window._onValue(window._ref(window._db,'users'), snap => {
    window._users = Object.entries(snap.val()||{}).map(([id,v])=>({_id:id,...v}));
    refreshUI();
  });
}

async function ensureAdmin() {
  const snap = await window._get(window._ref(window._db,'users/admin'));
  if (!snap.exists()) {
    await window._set(window._ref(window._db,'users/admin'),{id:'admin',name:'Administrateur',role:'admin',pwd:'admin123',perms:{}});
  }
}

function refreshUI() {
  if (!currentUser) return;
  if (currentUser.role === 'admin') {
    renderDashboard();
    renderTable();
    renderHisto();
    renderUsers();
  } else {
    if (hasPerm('magasinier')) renderTable();
    if (hasPerm('vendeur')) {} // scanner — pas de refresh nécessaire
    if (hasPerm('historique')) renderMyHisto();
  }
}

function hasPerm(p) {
  if (!currentUser) return false;
  if (currentUser.role === 'admin') return true;
  return !!(currentUser.perms && currentUser.perms[p]);
}

// ══════════════════════════════════════════
// LOGIN / LOGOUT
// ══════════════════════════════════════════
async function doLogin() {
  const id = document.getElementById('login-id').value.trim();
  const pwd = document.getElementById('login-pwd').value;
  const err = document.getElementById('login-err');
  err.style.display = 'none';
  if (!id || !pwd) { err.style.display='block'; err.textContent='Remplissez tous les champs'; return; }
  const snap = await window._get(window._ref(window._db,'users'));
  const found = Object.values(snap.val()||{}).find(u => u.id===id && u.pwd===pwd);
  if (!found) { err.style.display='block'; return; }
  currentUser = { _id: found._id||id, id:found.id, name:found.name, role:found.role, perms:found.perms||{} };
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('hdr-name').textContent = found.name;
  if (found.role === 'admin') {
    document.getElementById('hdr-role').textContent = 'Admin';
    document.getElementById('hdr-role').className = 'role-tag role-admin';
  } else {
    const permsLabel = Object.keys(found.perms||{}).filter(k=>found.perms[k]).map(k=>k.charAt(0).toUpperCase()+k.slice(1)).join(' · ') || 'Aucune permission';
    document.getElementById('hdr-role').textContent = permsLabel;
    document.getElementById('hdr-role').className = 'role-tag role-user';
  }
  buildUI();
}

function doLogout() {
  currentUser = null;
  if (isScanning) stopCam();
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-id').value = '';
  document.getElementById('login-pwd').value = '';
  document.getElementById('tab-bar').innerHTML = '';
  document.getElementById('main-content').innerHTML = '';
}

// ══════════════════════════════════════════
// BUILD UI DYNAMIQUE
// ══════════════════════════════════════════
function buildUI() {
  const isAdmin = currentUser.role === 'admin';
  const tabs = [];
  const panels = [];

  if (isAdmin) {
    tabs.push({id:'dashboard', label:'📊 Dashboard'});
    panels.push({id:'dashboard', html: dashboardHTML()});
    tabs.push({id:'add', label:'＋ Ajouter'});
    panels.push({id:'add', html: addPieceHTML()});
    tabs.push({id:'stock', label:'📦 Stock'});
    panels.push({id:'stock', html: stockHTML()});
    tabs.push({id:'histo', label:'📋 Historique'});
    panels.push({id:'histo', html: histoHTML(true)});
    tabs.push({id:'users', label:'👥 Utilisateurs'});
    panels.push({id:'users', html: usersHTML()});
  } else {
    if (hasPerm('magasinier')) {
      tabs.push({id:'add', label:'＋ Ajouter'});
      panels.push({id:'add', html: addPieceHTML()});
      tabs.push({id:'stock', label:'📦 Stock'});
      panels.push({id:'stock', html: stockHTML()});
    }
    if (hasPerm('vendeur')) {
      tabs.push({id:'scan', label:'📷 Scanner'});
      panels.push({id:'scan', html: scanHTML()});
    }
    if (hasPerm('historique')) {
      tabs.push({id:'myhisto', label:'📋 Mon historique'});
      panels.push({id:'myhisto', html: histoHTML(false)});
    }
  }

  if (isAdmin) {
    tabs.push({id:'scan', label:'📷 Scanner'});
    panels.push({id:'scan', html: scanHTML()});
  }

  // Render tabs
  document.getElementById('tab-bar').innerHTML = tabs.map((t,i) =>
    `<button class="tab${i===0?' active':''}" onclick="switchTab('${t.id}',this)" id="tab-${t.id}">${t.label}</button>`
  ).join('');

  // Render panels
  document.getElementById('main-content').innerHTML = panels.map((p,i) =>
    `<div class="panel${i===0?' active':''}" id="panel-${p.id}">${p.html}</div>`
  ).join('');

  refreshUI();
}

function switchTab(name, el) {
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  const panel = document.getElementById('panel-'+name);
  if (panel) panel.classList.add('active');
  el.classList.add('active');
  if (name !== 'scan' && isScanning) stopCam();
}

// ══════════════════════════════════════════
// DASHBOARD
// ══════════════════════════════════════════
function renderDashboard() {
  if (!document.getElementById('stats-grid')) return;
  const s = window._stock;
  const h = window._historique;
  const now = Date.now();
  const today = new Date().toDateString();
  const week = now - 7*86400000;
  const month = now - 30*86400000;
  const ventes = h.filter(x=>x.type==='vente');
  const caToday = ventes.filter(x=>new Date(x.ts).toDateString()===today).reduce((a,x)=>a+(x.prixVente||0)*x.qty,0);
  const caWeek = ventes.filter(x=>x.ts>=week).reduce((a,x)=>a+(x.prixVente||0)*x.qty,0);
  const caMonth = ventes.filter(x=>x.ts>=month).reduce((a,x)=>a+(x.prixVente||0)*x.qty,0);
  const totalVal = s.reduce((a,p)=>a+(p.price||0)*(p.qty||0),0);
  const stockBas = s.filter(p=>p.qty<=1).length;
  const ventesAuj = ventes.filter(x=>new Date(x.ts).toDateString()===today).length;

  document.getElementById('stats-grid').innerHTML = `
    <div class="stat c-accent"><strong>${s.length}</strong><span>Références</span></div>
    <div class="stat c-green"><strong>${caToday.toFixed(2)} €</strong><span>CA aujourd'hui</span></div>
    <div class="stat c-blue"><strong>${caWeek.toFixed(2)} €</strong><span>CA cette semaine</span></div>
    <div class="stat c-purple"><strong>${caMonth.toFixed(2)} €</strong><span>CA ce mois</span></div>
    <div class="stat"><strong>${totalVal.toFixed(0)} €</strong><span>Valeur stock</span></div>
    <div class="stat c-orange"><strong>${ventesAuj}</strong><span>Ventes aujourd'hui</span></div>
    ${stockBas>0?`<div class="stat"><strong style="color:var(--danger)">${stockBas}</strong><span>⚠ Stock bas</span></div>`:''}`;

  // Chart 7 jours
  const days = Array.from({length:7},(_,i)=>{
    const d = new Date(now-(6-i)*86400000);
    return {label:d.toLocaleDateString('fr-FR',{weekday:'short'}), ca:ventes.filter(x=>new Date(x.ts).toDateString()===d.toDateString()).reduce((a,x)=>a+(x.prixVente||0)*x.qty,0)};
  });
  const max = Math.max(...days.map(d=>d.ca),1);
  if (document.getElementById('chart-wrap')) {
    document.getElementById('chart-wrap').innerHTML = `<div class="chart-wrap">${days.map(d=>`
      <div class="bar-col">
        <div class="bar-val">${d.ca>0?d.ca.toFixed(0)+'€':''}</div>
        <div class="bar" style="height:${Math.max((d.ca/max)*60,2)}px"></div>
        <div class="bar-lbl">${d.label}</div>
      </div>`).join('')}</div>`;
  }

  // Dernières ventes
  if (document.getElementById('dash-ventes')) {
    const last5 = ventes.slice(0,5);
    document.getElementById('dash-ventes').innerHTML = last5.length ? last5.map(v=>`
      <div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px;">
        <span class="ref-pill">${v.ref}</span>
        <span style="flex:1;">${v.name}</span>
        <span class="histo-user">${v.user||'—'}</span>
        <span class="price-tag">${((v.prixVente||0)*v.qty).toFixed(2)} €</span>
      </div>`).join('') : '<div style="color:var(--muted);font-size:12px;padding:12px 0;text-align:center;">Aucune vente</div>';
  }

  // Paiements
  if (document.getElementById('pay-stats')) {
    const pays = {};
    ventes.filter(x=>x.ts>=month).forEach(v=>{const p=v.payment||'Non renseigné';pays[p]=(pays[p]||0)+(v.prixVente||0)*v.qty;});
    const totalPay = Object.values(pays).reduce((a,b)=>a+b,0)||1;
    const colors = {'Espèces':'var(--accent2)','Carte bancaire':'var(--blue)','Virement':'var(--purple)','Chèque':'var(--orange)'};
    document.getElementById('pay-stats').innerHTML = Object.entries(pays).length ?
      `<div class="pay-list">${Object.entries(pays).map(([k,v])=>`
        <div class="pay-row">
          <span class="pay-label">${k}</span>
          <div style="flex:1;background:var(--surface2);border-radius:3px;height:6px;overflow:hidden;">
            <div style="height:100%;width:${(v/totalPay*100).toFixed(0)}%;background:${colors[k]||'var(--accent)'};border-radius:3px;"></div>
          </div>
          <span class="pay-val">${v.toFixed(2)} €</span>
        </div>`).join('')}</div>` :
      '<div style="color:var(--muted);font-size:12px;padding:8px 0;">Aucune donnée</div>';
  }

  // Activité utilisateurs
  if (document.getElementById('user-activity')) {
    const userStats = {};
    h.filter(x=>x.ts>=month).forEach(x=>{
      if(!x.user) return;
      if(!userStats[x.user]) userStats[x.user]={ventes:0,ajouts:0,ca:0};
      if(x.type==='vente'){userStats[x.user].ventes++;userStats[x.user].ca+=(x.prixVente||0)*x.qty;}
      if(x.type==='ajout') userStats[x.user].ajouts++;
    });
    document.getElementById('user-activity').innerHTML = Object.entries(userStats).length ?
      Object.entries(userStats).map(([name,stat])=>`
        <div class="activity-row">
          <div class="activity-avatar">${name[0].toUpperCase()}</div>
          <span class="activity-name">${name}</span>
          <span style="color:var(--muted);font-size:11px;">${stat.ajouts} ajout(s)</span>
          <span class="activity-stat" style="margin-left:8px;">${stat.ventes} vente(s) · ${stat.ca.toFixed(2)} €</span>
        </div>`).join('') :
      '<div style="color:var(--muted);font-size:12px;padding:8px 0;">Aucune activité ce mois</div>';
  }

  // Alertes stock bas
  if (document.getElementById('stock-alerts')) {
    const bas = window._stock.filter(p=>p.qty<=1);
    document.getElementById('stock-alerts').innerHTML = bas.length ?
      bas.map(p=>`<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px;">
        <span class="ref-pill">${p.ref}</span>
        <span style="flex:1;">${p.name}</span>
        ${p.zone?`<span class="zone-tag">${p.zone}</span>`:''}
        <span class="alert-badge">Stock : ${p.qty}</span>
      </div>`).join('') :
      '<div style="color:var(--accent2);font-size:12px;padding:8px 0;">✓ Tout le stock est suffisant</div>';
  }
}

function clearForm() {
  ['f-ref','f-name','f-vehicle','f-oem','f-zone','f-notes','f-photo'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  const fqty=document.getElementById('f-qty');if(fqty)fqty.value='1';
  const fp=document.getElementById('f-price');if(fp)fp.value='';
  const bp=document.getElementById('barcode-preview');if(bp)bp.style.display='none';
}

async function addPiece() {
  const ref=(document.getElementById('f-ref').value||'').trim().toUpperCase();
  const name=(document.getElementById('f-name').value||'').trim();
  const qty=parseInt(document.getElementById('f-qty').value)||0;
  if(!ref){toast('La référence est requise',true);return;}
  if(!name){toast('La désignation est requise',true);return;}
  if(window._stock.find(p=>p.ref===ref)){toast('Référence déjà existante',true);return;}
  const piece={ref,name,
    vehicle:(document.getElementById('f-vehicle').value||'').trim(),
    oem:(document.getElementById('f-oem').value||'').trim(),
    qty,price:parseFloat(document.getElementById('f-price').value)||0,
    zone:(document.getElementById('f-zone').value||'').trim(),
    etat:document.getElementById('f-etat').value,
    photo:(document.getElementById('f-photo').value||'').trim(),
    notes:(document.getElementById('f-notes').value||'').trim(),
    fmt:document.getElementById('f-format').value,
    added:new Date().toISOString()
  };
  const r=window._push(window._ref(window._db,'stock'));
  await window._set(r,piece);
  await addHisto({type:'ajout',ref,name,qty,user:currentUser.name,ts:Date.now(),date:new Date().toLocaleString('fr-FR')});
  showBC(ref,name,piece.fmt,'bc-svg','bc-name');
  document.getElementById('barcode-preview').style.display='block';
  toast('✓ '+ref+' enregistré !');
  clearForm();
}

function renderTable(q='') {

  if(stats){
    const s=window._stock;
    const totalQty=s.reduce((a,p)=>a+(p.qty||0),0);
    const totalVal=s.reduce((a,p)=>a+(p.price||0)*(p.qty||0),0);
    stats.innerHTML=`<div class="stat c-accent"><strong>${s.length}</strong><span>Références</span></div><div class="stat"><strong>${totalQty}</strong><span>Pièces</span></div><div class="stat c-green"><strong>${totalVal.toFixed(0)} €</strong><span>Valeur catalogue</span></div>`;
  }
  const q2=q.toLowerCase();
  const ef=document.getElementById('filter-etat')?.value||'';
  let list=window._stock;
  if(q) list=list.filter(p=>(p.ref||'').toLowerCase().includes(q2)||(p.name||'').toLowerCase().includes(q2)||(p.vehicle||'').toLowerCase().includes(q2)||(p.oem||'').toLowerCase().includes(q2)||(p.zone||'').toLowerCase().includes(q2));

  tbody.innerHTML=list.map(p=>{
    const qc=p.qty===0?'qty-zero':p.qty<=1?'qty-low':'qty-ok';
    return `<tr>
      <td>${p.photo?`<img src="${p.photo}" class="piece-thumb" onerror="this.style.display='none'">`:''}</td>
      <td><span class="ref-pill">${p.ref}</span></td>
      <td>${p.name}${p.notes?`<div style="font-size:10px;color:var(--muted);margin-top:2px;">${p.notes}</div>`:''}</td>
      <td style="font-size:11px;color:var(--muted)">${p.vehicle||'—'}</td>
      <td style="font-size:11px;color:var(--muted);font-family:'IBM Plex Mono',monospace">${p.oem||'—'}</td>
      <td><span class="qty-pill ${qc}">${p.qty}</span></td>
      <td><span class="price-tag">${p.price?p.price.toFixed(2)+' €':'—'}</span></td>
      <td>${p.zone?`<span class="zone-tag">${p.zone}</span>`:'—'}</td>
      <td style="font-size:11px;color:var(--muted)">${p.etat||'—'}</td>
      <td><div class="action-btns">
        ${hasPerm('vendeur')?`<button class="btn-xs sell" onclick="openSell('${p._id}')">💰</button>`:''}
        ${isAdmin||hasPerm('magasinier')?`<button class="btn-xs" onclick="openEdit('${p._id}')">✏</button>`:''}
        ${isAdmin||hasPerm('magasinier')?`<button class="btn-xs" onclick="openPieceBC('${p._id}')">BC</button>`:''}
        ${isAdmin?`<button class="btn-xs del" onclick="deletePiece('${p._id}')">✕</button>`:''}

function openSell(id) {

  document.getElementById('sell-info').innerHTML=`
    <span class="ref-pill">${p.ref}</span> <strong style="margin-left:8px">${p.name}</strong>
    <div style="color:var(--muted);font-size:11px;margin-top:4px;">Stock actuel : <strong style="color:var(--accent)">${p.qty}</strong>${p.vehicle?' | '+p.vehicle:''}</div>`;
  document.getElementById('modal-sell').classList.add('open');
}

async function confirmSell() {
  const id=document.getElementById('sell-id').value;
  const p=window._stock.find(x=>x._id===id);if(!p) return;
  const qty=parseInt(document.getElementById('sell-qty').value)||0;
  const prixVente=parseFloat(document.getElementById('sell-price').value);
  const payment=document.getElementById('sell-payment').value;
  const client=document.getElementById('sell-client').value.trim();
  let valid=true;
  if(!qty||qty<1){document.getElementById('sell-qty').classList.add('invalid');valid=false;}else document.getElementById('sell-qty').classList.remove('invalid');
  if(!prixVente||prixVente<=0){document.getElementById('sell-price').classList.add('invalid');valid=false;}else document.getElementById('sell-price').classList.remove('invalid');
  if(!payment){document.getElementById('sell-payment').classList.add('invalid');valid=false;}else document.getElementById('sell-payment').classList.remove('invalid');
  if(!valid){toast('Remplissez tous les champs obligatoires',true);return;}
  if(qty>p.qty){toast('Stock insuffisant',true);return;}
  await window._update(window._ref(window._db,'stock/'+id),{qty:p.qty-qty});
  await addHisto({type:'vente',ref:p.ref,name:p.name,qty,prixVente,payment,client,user:currentUser.name,ts:Date.now(),date:new Date().toLocaleString('fr-FR')});
  closeModal('modal-sell');
  toast('✓ Vente enregistrée — '+(p.qty-qty)+' restant(s)');
  if(confirm('Imprimer le ticket de vente ?')) printTicket(p,qty,prixVente,payment,client);
}

function printTicket(p,qty,prix,payment,client) {
  const total=(qty*prix).toFixed(2);
  document.getElementById('ticket-print').innerHTML=`
    <div class="ticket-header"><div style="font-size:18px;font-weight:700;">FISSA PIECE AUTO</div><div style="font-size:11px;margin-top:4px;">Pièces automobiles d'occasion</div><div style="font-size:11px;margin-top:8px;">${new Date().toLocaleString('fr-FR')}</div>${client?`<div style="font-size:11px;">Client : ${client}</div>`:''}</div>

    <div class="ticket-row"><span>Réf : ${p.ref}</span></div>
    ${p.vehicle?`<div class="ticket-row"><span>Véhicule : ${p.vehicle}</span></div>`:''}
    <div class="ticket-row"><span>Qté : ${qty}</span><span>${prix.toFixed(2)} €/u</span></div>
    <div class="ticket-row"><span>Paiement : ${payment}</span></div>
    <div class="ticket-total"><div class="ticket-row"><span>TOTAL</span><span>${total} €</span></div></div>
    <div style="text-align:center;margin-top:14px;font-size:10px;">Merci de votre visite !</div>`;
  window.print();
}

// ══════════════════════════════════════════
let isScanning=false,html5QrCode=null;
let lastCode='',lastCodeTime=0;

async function toggleCam() {
  if(isScanning){stopCam();return;}
  html5QrCode=new Html5Qrcode("camera-view");
  html5QrCode.start({facingMode:"environment"},{fps:10,qrbox:{width:240,height:140},formatsToSupport:[Html5QrcodeSupportedFormats.CODE_128,Html5QrcodeSupportedFormats.EAN_13,Html5QrcodeSupportedFormats.EAN_8,Html5QrcodeSupportedFormats.CODE_39,Html5QrcodeSupportedFormats.ITF,Html5QrcodeSupportedFormats.QR_CODE]},
  val=>{const now=Date.now();if(!val||(val===lastCode&&now-lastCodeTime<3000))return;lastCode=val;lastCodeTime=now;processCode(val.toUpperCase());},
  ()=>{}
  ).then(()=>{isScanning=true;document.getElementById('cam-btn').textContent='⏹ Arrêter';document.getElementById('scan-frame').classList.add('on');document.getElementById('scan-line').classList.add('on');setCamStatus('on','Scanning… Pointez vers le code-barres');}).catch(e=>{setCamStatus('err','Accès caméra refusé');toast('Caméra inaccessible : '+e,true);});
}

function stopCam() {
  if(html5QrCode){html5QrCode.stop().then(()=>{html5QrCode.clear();html5QrCode=null;}).catch(()=>{});}
  isScanning=false;
  document.getElementById('cam-btn').textContent='▶ Démarrer';
  document.getElementById('scan-frame').classList.remove('on');
  document.getElementById('scan-line').classList.remove('on');
  setCamStatus('','Caméra arrêtée');
}

function setCamStatus(cls,txt){document.getElementById('cam-status').className='cam-status'+(cls?' '+cls:'');document.getElementById('cam-txt').textContent=txt;}

function processUSB(){const el=document.getElementById('usb-in');const val=el.value.trim().toUpperCase();if(!val)return;el.value='';processCode(val);el.focus();}

function processCode(code) {
  const p=window._stock.find(x=>x.ref===code);
  const now=new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  const res=document.getElementById('scan-result');res.style.display='block';
  if(p){
    res.className='';
    res.innerHTML=`<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
      ${p.photo?`<img src="${p.photo}" style="width:64px;height:64px;object-fit:cover;border-radius:6px;border:1px solid var(--border);" onerror="this.style.display='none'">`:'' }
      <div style="flex:1;">
        <div style="font-family:'IBM Plex Mono',monospace;font-size:16px;font-weight:700;color:var(--accent)">${p.ref}</div>
        <div style="font-size:14px;font-weight:600;margin:2px 0">${p.name}</div>
        <div style="font-size:11px;color:var(--muted)">${p.vehicle?'🚗 '+p.vehicle+' &nbsp;':''}📍 ${p.zone||'—'} &nbsp; 📦 <strong style="color:${p.qty<=1?'var(--danger)':'var(--accent)'}">${p.qty}</strong>${p.oem?' &nbsp; OEM: '+p.oem:''}</div>
        ${p.price?`<div style="color:var(--accent2);font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:600;margin-top:3px;">Prix catalogue : ${p.price.toFixed(2)} €</div>`:''}
      </div></div>
      ${hasPerm('vendeur')?`<div class="btn-row" style="margin-top:10px;"><button class="btn btn-success" style="font-size:11px;" onclick="openSell('${p._id}')">💰 Enregistrer une vente</button></div>`:''}`;
    toast('✓ '+p.ref+' — '+p.name);
  } else {
    res.className='err';
    res.innerHTML=`<div style="color:var(--danger);font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:700;">Code inconnu : ${code}</div><div style="color:var(--muted);font-size:12px;margin-top:4px;">Cette référence n'existe pas dans le stock.</div>`;
    toast('Code inconnu : '+code,true);
  }
  const log=document.getElementById('scan-log');const empty=log.querySelector('.log-empty');if(empty)empty.remove();
  const div=document.createElement('div');div.className='log-entry';
  div.innerHTML=p?`<span class="log-ts">${now}</span><span class="log-ref">${p.ref}</span><span class="log-name">${p.name}</span><span class="log-ok">✓</span>`:`<span class="log-ts">${now}</span><span class="log-ref">${code}</span><span class="log-name" style="color:var(--muted)">Inconnu</span><span class="log-err">✕</span>`;
  log.prepend(div);
}

function clearLog(){document.getElementById('scan-log').innerHTML='<div class="log-empty" style="color:var(--muted);font-size:12px;padding:14px 0;text-align:center;">Aucun scan</div>';document.getElementById('scan-result').style.display='none';}

// ══════════════════════════════════════════
// BARCODE
// ══════════════════════════════════════════
function showBC(ref,name,fmt,svgId,nameId){try{JsBarcode('#'+svgId,ref,{format:fmt||'CODE128',width:2,height:50,displayValue:true,fontSize:10,margin:8,background:'#ffffff',lineColor:'#000000'});if(nameId)document.getElementById(nameId).textContent=name;}catch(e){toast('Format code-barres incompatible',true);}}
function printBC(svgId,nameId){const win=window.open('','_blank');win.document.write(`<html><body style="text-align:center;padding:20px;font-family:monospace">${document.getElementById(svgId).outerHTML}<br><b>${document.getElementById(nameId).textContent}</b></body></html>`);win.document.close();win.print();}
function downloadBC(){html2canvas(document.getElementById('barcode-preview'),{backgroundColor:'#fff'}).then(c=>{const a=document.createElement('a');a.href=c.toDataURL('image/png');a.download='barcode.png';a.click();});}
function openPieceBC(id){const p=window._stock.find(x=>x._id===id);if(!p)return;showBC(p.ref,p.name,p.fmt||'CODE128','modal-bc-svg','modal-bc-name');document.getElementById('modal-bc').classList.add('open');}

// ══════════════════════════════════════════
// EXPORT / IMPORT CSV
// ══════════════════════════════════════════
function exportCSV(){if(!window._stock.length){toast('Stock vide',true);return;}const header=['Référence','Désignation','Véhicule','OEM','Quantité','Prix (€)','Zone','État','Photo','Notes','Ajouté le'];const rows=window._stock.map(p=>[p.ref,p.name,p.vehicle||'',p.oem||'',p.qty,p.price||0,p.zone||'',p.etat||'',p.photo||'',p.notes||'',p.added?p.added.slice(0,10):'']);const csv='\uFEFF'+[header,...rows].map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(';')).join('\r\n');const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));a.download='stock_fissa_'+new Date().toISOString().slice(0,10)+'.csv';a.click();toast('Export CSV téléchargé');}

function importCSV(input){const file=input.files[0];if(!file)return;const reader=new FileReader();reader.onload=async e=>{const text=e.target.result;const lines=text.split(/\r?\n/).filter(l=>l.trim());if(lines.length<2){document.getElementById('csv-result').textContent='Fichier vide';return;}const header=lines[0].split(';').map(h=>h.replace(/"/g,'').trim().toLowerCase());let added=0,skipped=0;for(let i=1;i<lines.length;i++){const cols=lines[i].split(';').map(c=>c.replace(/"/g,'').trim());const ref=(cols[header.indexOf('reference')]||cols[0]||'').toUpperCase();const name=cols[header.indexOf('designation')]||cols[1]||'';if(!ref||!name){skipped++;continue;}if(window._stock.find(p=>p.ref===ref)){skipped++;continue;}const piece={ref,name,vehicle:cols[header.indexOf('vehicule')]||cols[2]||'',oem:cols[header.indexOf('oem')]||cols[3]||'',qty:parseInt(cols[header.indexOf('quantite')]||cols[4])||0,price:parseFloat(cols[header.indexOf('prix')]||cols[5])||0,zone:cols[header.indexOf('zone')]||cols[6]||'',etat:cols[header.indexOf('etat')]||cols[7]||'Bon état',notes:cols[header.indexOf('notes')]||cols[8]||'',fmt:'CODE128',added:new Date().toISOString()};const r=window._push(window._ref(window._db,'stock'));await window._set(r,piece);await addHisto({type:'ajout',ref,name,qty:piece.qty,user:currentUser.name,ts:Date.now(),date:new Date().toLocaleString('fr-FR')});added++;}document.getElementById('csv-result').innerHTML=`<span style="color:var(--accent2)">✓ ${added} pièce(s) importée(s)</span>${skipped?` <span style="color:var(--muted)">(${skipped} ignorée(s))</span>`:''}`; input.value='';};reader.readAsText(file,'UTF-8');}

// ══════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════
function closeModal(id){document.getElementById(id).classList.remove('open');}
function toast(msg,isErr=false){const t=document.getElementById('toast');t.textContent=msg;t.className='toast show'+(isErr?' err':'');setTimeout(()=>t.className='toast',3000);}
</script>
</body>
</html>
